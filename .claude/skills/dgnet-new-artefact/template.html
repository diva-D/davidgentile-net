<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ARTEFACT TITLE · artefact</title>
<link rel="preconnect" href="https://rsms.me/" />
<link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
<style>
  :root {
    --bg: #faf7f0;
    --ink: #1a1a1d;
    --ink-soft: #4a4a52;
    --muted: #8c8c93;
    --line: #e4dfd2;
    --accent: #d94b2f;
    --gold: #e0a526;
    --green: #3a9f5e;
    --paper: #fff;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: "Iowan Old Style", "Palatino", ui-serif, Georgia, serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ==== STRUCTURAL — do not change ==== */
  .wrap { max-width: 1040px; margin: 0 auto; padding: 24px 24px 28px; }
  .stage {
    background: var(--paper); border: 1px solid var(--line); border-radius: 14px;
    padding: 24px; box-shadow: 0 2px 0 rgba(0,0,0,0.03);
  }

  /* ==== COMMON PRIMITIVES — reuse where helpful ==== */
  .prompt {
    font-family: "Inter", sans-serif; font-size: 14px; font-weight: 700;
    letter-spacing: 0.3px; color: var(--ink); text-align: center;
    padding: 4px 0 18px; border-bottom: 1px solid var(--line); margin-bottom: 20px;
  }
  .prompt em { color: var(--accent); font-style: normal; font-weight: 700; }

  .btn {
    font-family: "Inter", sans-serif; font-size: 12px; font-weight: 700;
    padding: 9px 14px; border-radius: 8px; border: 1px solid var(--ink);
    background: var(--paper); color: var(--ink); cursor: pointer; letter-spacing: 0.3px;
  }
  .btn:hover { background: var(--ink); color: var(--paper); }
  .btn.primary { background: var(--ink); color: var(--paper); }
  .btn.primary:hover { background: var(--accent); border-color: var(--accent); }

  .chip {
    font-family: "Inter", sans-serif; font-size: 10px; font-weight: 700;
    letter-spacing: 0.5px; padding: 5px 9px; border-radius: 999px;
    border: 1px solid var(--line); background: var(--paper); cursor: pointer; color: var(--ink-soft);
  }
  .chip.on { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  .card {
    background: var(--paper); border: 1px solid var(--line); border-radius: 8px;
    padding: 10px 12px; font-family: "Inter", sans-serif;
  }

  .counter {
    font-family: "Inter", sans-serif; padding: 12px 14px; border-radius: 8px;
    border: 1px solid var(--line); background: var(--paper);
  }
  .counter .lbl { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); font-weight: 700; }
  .counter .big { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; line-height: 1.1; margin-top: 2px; }
  .counter .big.bad { color: var(--accent); }
  .counter .big.good { color: var(--green); }

  .note {
    font-family: "Inter", sans-serif; font-size: 12px; color: var(--ink-soft);
    background: #fffbe8; border: 1px solid #e8d68a; border-radius: 8px;
    padding: 10px 14px; margin-top: 16px; line-height: 1.5;
  }
  .note b { color: var(--ink); }

  /* ==== ARTEFACT-SPECIFIC STYLES BELOW ==== */
  /* Add only what this specific mechanism needs. Keep it minimal. */

</style>
</head>
<body>
<div class="wrap">
  <div class="stage">

    <!-- Optional one-line prompt that is part of the mechanism, not framing.
         Delete this block if not needed. -->
    <div class="prompt">What happens when you <em>do the thing</em>?</div>

    <!-- ====== THE ONE MECHANISM ====== -->
    <!-- Build the single interactive element here. One action → one reveal. -->
    <div id="mechanism">
      <!-- e.g. panels, cards, a canvas, a chart, a slider -->
    </div>

    <!-- Optional controls row -->
    <div style="margin-top: 18px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;">
      <button class="btn primary" id="actionBtn">Primary action →</button>
      <button class="btn" id="resetBtn">Reset</button>
    </div>

    <!-- Optional inline insight that updates with state — NOT framing prose. -->
    <div class="note" id="insight"><b>Try it:</b> short prompt that nudges the reader into the mechanism.</div>

  </div>
</div>

<script>
  // State + render pattern. Keep it tiny.
  let state = { /* ... */ };

  function render() {
    // update DOM from state
  }

  document.getElementById("actionBtn").onclick = () => {
    // state change
    render();
  };

  document.getElementById("resetBtn").onclick = () => {
    // reset
    render();
  };

  render();
</script>
</body>
</html>

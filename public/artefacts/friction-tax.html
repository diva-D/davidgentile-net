<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The friction tax · artefact</title>
<link rel="preconnect" href="https://rsms.me/" />
<link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
<style>
  :root {
    --bg: #faf7f0;
    --ink: #1a1a1d;
    --ink-soft: #4a4a52;
    --muted: #8c8c93;
    --line: #e4dfd2;
    --accent: #d94b2f;
    --gold: #e0a526;
    --green: #3a9f5e;
    --paper: #fff;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: "Iowan Old Style", "Palatino", ui-serif, Georgia, serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ==== STRUCTURAL ==== */
  .wrap { max-width: 1040px; margin: 0 auto; padding: 24px 24px 28px; }
  .stage {
    background: var(--paper); border: 1px solid var(--line); border-radius: 14px;
    padding: 24px 28px 22px; box-shadow: 0 2px 0 rgba(0,0,0,0.03);
    display: flex; flex-direction: column; min-height: 720px;
  }

  /* ==== PHASE HEADER ==== */
  .phase-header {
    display: flex; align-items: center; gap: 14px;
    padding-bottom: 14px; border-bottom: 1px solid var(--line); margin-bottom: 16px;
  }
  .phase-progress { display: flex; gap: 6px; }
  .phase-dot {
    width: 30px; height: 4px; border-radius: 2px; background: var(--line);
    transition: background 0.3s ease;
  }
  .phase-dot.done { background: var(--muted); }
  .phase-dot.active { background: var(--accent); }
  .phase-counter {
    font-family: "Inter", sans-serif; font-size: 10px; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--muted); font-weight: 700;
    margin-left: auto;
  }
  .phase-narration {
    font-size: 18px; line-height: 1.5; color: var(--ink); font-weight: 600;
    min-height: 54px; max-width: 820px;
  }
  .phase-narration em { color: var(--accent); font-style: italic; font-weight: 600; }
  .phase-narration.fade-in { animation: fadeSlide 0.45s ease; }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: none; }
  }

  /* ==== PHASE-SPECIFIC CONTROLS (appear/disappear per phase) ==== */

  /* Phase 3 "Extract" trigger */
  .extract-control {
    display: none; margin: 12px 0 8px;
    align-items: center; justify-content: center; gap: 10px;
  }
  body.p3 .extract-control { display: flex; }
  .extract-btn {
    font-family: "Inter", sans-serif; font-size: 12px; font-weight: 700;
    padding: 10px 18px; border-radius: 8px; border: 1px solid var(--ink);
    background: var(--ink); color: var(--paper); cursor: pointer; letter-spacing: 0.3px;
  }
  .extract-btn:hover { background: var(--accent); border-color: var(--accent); }
  .extract-btn:disabled {
    background: var(--paper); color: var(--muted); border-color: var(--line); cursor: default;
  }
  .extract-btn .spark { margin-right: 6px; }

  /* Phase 4 filter row */
  .filter-row {
    display: none; margin: 8px 0 14px; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  body.p4 .filter-row { display: flex; }
  .ask {
    font-family: "Inter", sans-serif; font-size: 13px; font-weight: 700;
    color: var(--ink); letter-spacing: 0.2px;
  }
  .ask em { color: var(--accent); font-style: italic; font-weight: 700; }
  .filters { display: flex; gap: 6px; flex-wrap: wrap; margin-left: auto; }
  .chip {
    font-family: "Inter", sans-serif; font-size: 10px; font-weight: 700;
    letter-spacing: 0.5px; padding: 5px 10px; border-radius: 999px;
    border: 1px solid var(--line); background: var(--paper); cursor: pointer; color: var(--ink-soft);
    transition: background 0.2s, color 0.2s, border-color 0.2s;
  }
  .chip:hover { border-color: var(--ink); }
  .chip.on { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  /* ==== CANVAS ==== */
  .canvas {
    flex: 1; position: relative;
  }
  .items {
    display: flex; flex-direction: column; gap: 6px;
  }

  /* ==== ITEM: same element, multiple states ==== */
  .item {
    position: relative;
    background: var(--paper); border: 1px solid var(--line); border-radius: 8px;
    padding: 10px 14px;
    font-family: "Inter", sans-serif;
    transition: all 0.45s ease;
    opacity: 0; transform: translateY(6px);
    display: flex; flex-direction: column; gap: 7px;
  }
  .item.visible { opacity: 1; transform: none; }

  /* Header row: glyph + medium + raw-text */
  .item-row {
    display: grid;
    grid-template-columns: 28px 104px 1fr;
    grid-template-areas: "glyph medium raw";
    gap: 14px; align-items: center;
  }
  .item .glyph      { grid-area: glyph; }
  .item .medium-col { grid-area: medium; min-width: 0; }
  .item .raw-text   { grid-area: raw; min-width: 0; }

  /* Source medium — glyph + label column */
  .item .glyph {
    font-family: "SF Mono", "Menlo", ui-monospace, monospace;
    font-size: 20px; color: var(--ink); text-align: center; line-height: 1;
    opacity: 0.9;
  }
  .item .medium-col { min-width: 0; }
  .item .medium {
    font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--ink); font-weight: 800; display: block;
  }
  .item .detail {
    font-size: 10px; color: var(--muted); letter-spacing: 0.3px;
    display: block; margin-top: 1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .item .raw-text {
    font-size: 12.5px; line-height: 1.4; color: var(--ink-soft);
  }

  /* Phase 2: annotation — three field-coloured chips, each with label+value.
     Flows inline below the raw-text row; never overlaps.
     Container is reserved (display:flex) once phase 2/3 is active so chips can
     fade in without a display-change interrupting the transition. */
  .item .annot {
    display: none;
    flex-wrap: wrap; align-items: center; gap: 5px;
    padding-left: 42px;
    pointer-events: none;
    min-height: 0;
  }
  body.p2 .item .annot,
  body.p3 .item .annot { display: flex; }

  .item .annot-chip {
    font-family: "Inter", sans-serif;
    font-size: 9px; font-weight: 800; letter-spacing: 0.6px; text-transform: uppercase;
    padding: 3px 7px; border-radius: 4px;
    border: 1px solid transparent; background: transparent;
    opacity: 0; transform: translateY(2px);
    transition: opacity 0.55s ease, transform 0.55s ease;
    white-space: nowrap;
  }
  .item .annot-chip .lbl {
    font-weight: 700; opacity: 0.55; margin-right: 4px; letter-spacing: 0.8px;
  }

  /* Field colour coding — TYPE: accent, STATUS: gold, DUE: green */
  .item .annot-chip[data-f="type"]   { color: var(--accent); background: rgba(217,75,47,0.09); border-color: rgba(217,75,47,0.35); }
  .item .annot-chip[data-f="status"] { color: #b07c0f;       background: rgba(224,165,38,0.13); border-color: rgba(224,165,38,0.45); }
  .item .annot-chip[data-f="due"]    { color: #2f7f4a;       background: rgba(58,159,94,0.10);  border-color: rgba(58,159,94,0.4);  }

  .item.show-type .annot-chip[data-f="type"],
  .item.show-status .annot-chip[data-f="status"],
  .item.show-due .annot-chip[data-f="due"],
  .item.annotated .annot-chip { opacity: 1; transform: none; }

  /* Demo focus: soft accent frame around the item being explained */
  .item.demo-focus {
    border-color: rgba(26,26,29,0.35);
    box-shadow: 0 0 0 3px rgba(26,26,29,0.06);
    background: #fffdf8;
  }

  /* Raw-text highlight phrases — colour matches the chip's field */
  .item .raw-text .hl-src {
    padding: 1px 3px; border-radius: 3px;
    background: transparent; color: inherit;
    transition: background 0.3s ease, color 0.3s ease;
  }
  .item.focus-type .raw-text .hl-src[data-f="type"] {
    background: rgba(217,75,47,0.18); color: var(--ink);
  }
  .item.focus-status .raw-text .hl-src[data-f="status"] {
    background: rgba(224,165,38,0.25); color: var(--ink);
  }
  .item.focus-due .raw-text .hl-src[data-f="due"] {
    background: rgba(58,159,94,0.22); color: var(--ink);
  }

  /* Phase 3/4: typed view — rows morph into a schema table with a header.
     The table-head sits as the table's <thead>; each item becomes a <tr>. */
  .table-head {
    display: none;
    grid-template-columns: 78px 64px 100px minmax(0, 1.1fr) minmax(0, 1fr);
    gap: 12px;
    padding: 6px 14px 7px;
    margin: 0;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    background: #f5efe0;
    font-family: "Inter", sans-serif;
    font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--muted); font-weight: 800;
    border-radius: 6px 6px 0 0;
  }
  body.p3 .table-head,
  body.p4 .table-head { display: grid; }

  /* Once extraction has finished, the item list collapses into a tight grid:
     no card gaps, shared borders, hairline rows. While the wave is still
     running we keep the small gap so converted rows don't jam against
     un-converted ones. */
  body.p3:not(.pre-extract) .items,
  body.p4 .items { gap: 0; transition: gap 0.4s ease; }

  .item .typed {
    display: none;
    grid-template-columns: 78px 64px 100px minmax(0, 1.1fr) minmax(0, 1fr);
    gap: 12px; align-items: center;
    width: 100%;
  }
  .item.typed-view .item-row,
  .item.typed-view .annot { display: none; }
  .item.typed-view .typed { display: grid; }
  .item.typed-view {
    display: block;
    padding: 6px 14px;
    border-radius: 0;
    border-left: 1px solid var(--line);
    border-right: 1px solid var(--line);
    border-top: none;
    border-bottom: 1px solid var(--line);
    background: var(--paper);
    transition: background 0.25s ease;
  }
  .item.typed-view:last-child { border-radius: 0 0 6px 6px; }
  /* Explicit max-height so the collapse animation has a value to transition
     from when .filtered-out sets it to 0. */
  .item.typed-view { max-height: 80px; }

  /* Smooth crossfade as a row converts: old contents fade out, typed grid fades in.
     No per-cell stagger — one clean swap, ~250ms. */
  .item .typed { opacity: 0; transition: opacity 0.28s ease; }
  .item.typed-view .typed { opacity: 1; }
  .item .item-row,
  .item .annot { transition: opacity 0.18s ease; }
  .item.extracting .item-row,
  .item.extracting .annot { opacity: 0; }

  .typed .type {
    font-size: 9px; letter-spacing: 1px; text-transform: uppercase; font-weight: 800;
    padding: 3px 7px; border-radius: 3px; background: var(--line); color: var(--ink);
    justify-self: start; align-self: center;
  }
  .typed .status {
    font-size: 9px; letter-spacing: 1px; text-transform: uppercase; font-weight: 700;
    padding: 3px 7px; border-radius: 3px;
    justify-self: start; align-self: center;
  }
  .status.now     { background: var(--accent); color: #fff; }
  .status.today   { background: var(--gold);   color: #fff; }
  .status.waiting { background: #c8c2b0;       color: var(--ink); }
  .typed .due {
    font-size: 10.5px; color: var(--ink-soft); line-height: 1.3;
    align-self: center;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .typed .what {
    font-size: 12px; color: var(--ink); font-weight: 600; line-height: 1.3;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .typed .next {
    font-size: 11px; color: var(--ink-soft); font-weight: 400; line-height: 1.3;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .typed .next::before {
    content: "→"; color: var(--accent); font-weight: 700; margin-right: 6px;
  }

  /* Phase 4 filter hiding — collapse rows cleanly via max-height + padding,
     no negative margins (which caused rows to stack on top of each other
     once typed-view tightened the row height). */
  .item.filtered-out {
    opacity: 0;
    max-height: 0 !important;
    padding-top: 0 !important;
    padding-bottom: 0 !important;
    border-top-width: 0;
    border-bottom-width: 0;
    pointer-events: none;
    overflow: hidden;
  }

  /* ==== CONTROLS (bottom) ==== */
  .controls {
    display: flex; align-items: center; gap: 10px; justify-content: space-between;
    padding-top: 16px; border-top: 1px solid var(--line); margin-top: 18px;
  }
  .btn {
    font-family: "Inter", sans-serif; font-size: 12px; font-weight: 700;
    padding: 10px 16px; border-radius: 8px; border: 1px solid var(--ink);
    background: var(--paper); color: var(--ink); cursor: pointer; letter-spacing: 0.3px;
    transition: background 0.2s, color 0.2s;
  }
  .btn:hover { background: var(--ink); color: var(--paper); }
  .btn.primary { background: var(--ink); color: var(--paper); }
  .btn.primary:hover { background: var(--accent); border-color: var(--accent); }
  .btn.ghost { border-color: transparent; color: var(--muted); background: transparent; padding-left: 4px; }
  .btn.ghost:hover { color: var(--ink); background: transparent; }
  .btn:disabled { opacity: 0.25; cursor: not-allowed; }
  .btn:disabled:hover { background: var(--paper); color: var(--ink); }

  /* Phase 3 — Next button disabled until extraction done */
  body.p3.pre-extract .next-btn { opacity: 0.35; cursor: not-allowed; pointer-events: none; }

  /* ==== MOBILE (≤640px) ====
   * Every artefact must work on phones. Rule of thumb: stack vertically,
   * shrink padding, let chips wrap, keep tap targets ≥ 36px.
   * ========================== */
  @media (max-width: 640px) {
    .wrap  { padding: 12px 12px 18px; }
    .stage { padding: 18px 14px 18px; min-height: 0; border-radius: 10px; }

    .phase-header { padding-bottom: 10px; margin-bottom: 12px; gap: 10px; }
    .phase-dot { width: 20px; height: 3px; }
    .phase-narration { font-size: 15px; min-height: 44px; }

    /* Item: stack glyph/medium on one line above raw-text */
    .item { padding: 9px 12px; }
    .item-row {
      grid-template-columns: auto 1fr;
      grid-template-areas:
        "glyph medium"
        "raw   raw";
      gap: 4px 10px;
      align-items: start;
    }
    .item .glyph { font-size: 16px; align-self: center; }
    .item .medium-col { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; align-self: center; }
    .item .medium  { display: inline; font-size: 9px; }
    .item .detail  { display: inline; margin-left: 6px; margin-top: 0; font-size: 9.5px; }
    .item .raw-text { font-size: 12px; padding-top: 2px; }

    /* Chips: flow below row, no indent, wrap freely */
    .item .annot { padding-left: 0; gap: 4px; }
    .item .annot-chip { font-size: 8.5px; padding: 3px 6px; }

    /* Phase 3 extract button — bigger tap target */
    .extract-btn { font-size: 13px; padding: 12px 18px; width: 100%; }

    /* Phase 4 filter row */
    .filter-row { gap: 8px; }
    .ask { font-size: 12px; }
    .filters { margin-left: 0; }
    .chip { padding: 7px 11px; font-size: 10px; }

    /* Typed view (phase 3/4) — abandon the table on mobile. Each item becomes
       a stacked card, like Todoist / Things / Linear:
         row 1 (title): the task — prominent, wraps freely
         row 2 (next):  → next action — muted, wraps freely
         row 3 (meta):  type · status · due — small chips, wrap as needed
       No truncation. No squeezed columns. Reads like a real to-do list. */
    .table-head { display: none !important; }
    .item.typed-view {
      padding: 10px 12px;
      max-height: none;
    }
    .item.typed-view .typed {
      display: grid;
      grid-template-columns: auto auto 1fr;
      column-gap: 6px;
      row-gap: 5px;
      align-items: center;
    }
    .typed .what {
      grid-column: 1 / -1;
      font-size: 13px; font-weight: 600; line-height: 1.35;
      white-space: normal; overflow: visible;
      color: var(--ink);
      order: 1;
    }
    .typed .next {
      grid-column: 1 / -1;
      font-size: 11px; color: var(--ink-soft);
      white-space: normal; overflow: visible;
      line-height: 1.3;
      order: 2;
    }
    /* Meta row: type · status · due — sit on a single row, wrap if needed. */
    .typed .type   { order: 3; font-size: 8.5px; padding: 2px 6px; justify-self: start; }
    .typed .status { order: 4; font-size: 8.5px; padding: 2px 6px; justify-self: start; }
    .typed .due    { order: 5; font-size: 10px; color: var(--muted); justify-self: start; white-space: nowrap; }

    /* Controls: bigger tap target, tighter spacing. Stay at the natural
       bottom of the artefact — the parent page handles scrolling on phase
       change, and the reader naturally arrives at Next after walking the
       items. (Sticky doesn't work inside a self-sizing iframe.) */
    .controls { padding-top: 14px; margin-top: 14px; }
    .btn { font-size: 13px; padding: 12px 16px; min-height: 40px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">

    <div class="phase-header">
      <div class="phase-progress" id="progress"></div>
      <div class="phase-counter" id="counter">1 / 4</div>
    </div>

    <div class="phase-narration fade-in" id="narration">
      Your Monday morning — twelve items land on you before your coffee cools.
    </div>

    <!-- Phase 3: extract control -->
    <div class="extract-control">
      <button class="extract-btn" id="extractBtn"><span class="spark">⚡</span>Extract structure with AI</button>
    </div>

    <!-- Phase 4: filter row -->
    <div class="filter-row">
      <div class="ask">What needs your attention <em>right now</em>?</div>
      <div class="filters" id="filters"></div>
    </div>

    <div class="canvas">
      <div class="table-head" id="tableHead">
        <span>Type</span>
        <span>Status</span>
        <span>Due</span>
        <span>Task</span>
        <span>Next</span>
      </div>
      <div class="items" id="items"></div>
    </div>

    <div class="controls">
      <button class="btn ghost" id="backBtn">← back</button>
      <button class="btn primary next-btn" id="nextBtn">Next →</button>
    </div>

  </div>
</div>

<script>
/* ==== DATA ==== */
/* medium is one of: email | slack | voice | note | cal | meeting | thought */
const MEDIA = {
  email:   { glyph: "✉", label: "Email" },
  slack:   { glyph: "#", label: "Slack" },
  voice:   { glyph: "◉", label: "Voice" },
  note:    { glyph: "✎", label: "Note"  },
  cal:     { glyph: "▣", label: "Cal"   },
  meeting: { glyph: "▤", label: "Meeting" },
  thought: { glyph: "◌", label: "Thought" },
};
const ITEMS = [
  // The first three are the demo items for phase 2 — chosen to show three
  // distinct mediums (email, meeting notes, voice memo) and three different
  // ways the structure is "hidden" in the source. They run top-to-bottom.
  { id:1,  medium:"email",   detail:"08:12",                raw:"Priya: \"look at <span class='hl-src' data-f='type'>Q2 forecast</span> before <span class='hl-src' data-f='due'>board pre-read</span> — <span class='hl-src' data-f='status'>retention curve looks off</span>\"",
    type:"REVIEW",   status:"now",     due:"Today 2pm",        what:"Review Q2 forecast — retention curve",      next:"Open model, check retention tab" },
  { id:2,  medium:"meeting", detail:"Wed notes",            raw:"...<span class='hl-src' data-f='status'>action item (me)</span>: <span class='hl-src' data-f='type'>draft pricing one-pager</span> before <span class='hl-src' data-f='due'>friday sync</span>...",
    type:"WRITE",    status:"now",     due:"Thu · overdue tmrw", what:"One-pager on pricing change → exec staff", next:"Outline 5 bullets, expand" },
  { id:3,  medium:"voice",   detail:"yesterday",            raw:"\"...<span class='hl-src' data-f='type'>ask Maya</span> about the onboarding metric — <span class='hl-src' data-f='status'>wrong denominator</span>...\"",
    type:"QUESTION", status:"waiting", due:"—",                what:"Ask Maya: onboarding denominator",           next:"DM Maya" },
  { id:4,  medium:"slack",   detail:"#eng-leads · 08:34",   raw:"Daniel: reminder we owe legal the vendor list by EOD tmrw",
    type:"DELIVER",  status:"today",   due:"Tomorrow EOD",     what:"Send vendor list to legal",                  next:"Export sheet, email Rachel" },
  { id:5,  medium:"note",    detail:"on desk",              raw:"call back dentist",
    type:"ERRAND",   status:"today",   due:"Today",            what:"Call dentist back",                          next:"Call 555-0198" },
  { id:6,  medium:"email",   detail:"Mon 4:45pm",           raw:"Jordan: \"Acme contract attached — when you get a sec. no rush\"",
    type:"REVIEW",   status:"waiting", due:"Fri",              what:"Review Acme contract",                       next:"Read §4 (IP) and §9 (term)" },
  { id:7,  medium:"slack",   detail:"DM · 07:58",           raw:"Sam: ping when you want to pair on the hiring rubric 🙏",
    type:"MEETING",  status:"waiting", due:"This week",        what:"Pair with Sam on hiring rubric",             next:"Send 2 slot options" },
  { id:8,  medium:"email",   detail:"2 days ago",           raw:"Finance: Q1 expense reports still missing — 4 outstanding. Nudge?",
    type:"DELEGATE", status:"today",   due:"Today",            what:"Nudge team: Q1 expense reports (4 outstanding)", next:"Forward + set deadline" },
  { id:9,  medium:"cal",     detail:"tmrw 10am",            raw:"Board pre-read sync — 45 min — 4 invitees — no agenda attached",
    type:"MEETING",  status:"today",   due:"Tomorrow 10am",    what:"Prep for board pre-read sync",               next:"Write agenda, attach to invite" },
  { id:10, medium:"slack",   detail:"#product · 06:40",     raw:"Designer posted v3 settings flow — \"any blockers before I build?\"",
    type:"REVIEW",   status:"now",     due:"EOD",              what:"Review settings flow v3 → unblock design",   next:"Open Figma, leave comments" },
  { id:11, medium:"email",   detail:"last Thu",             raw:"Recruiter: candidate asked to move intro to next week — preferences?",
    type:"SCHEDULE", status:"waiting", due:"—",                what:"Reschedule candidate intro",                 next:"Send 3 times next week" },
  { id:12, medium:"thought", detail:"in the shower",        raw:"need to actually write up the Q2 retention thing properly someday",
    type:"THINK",    status:"waiting", due:"—",                what:"Write Q2 retention analysis (proper)",       next:"Block 2h Friday afternoon" },
];

const FILTERS = [
  { id:"now",     label:"Needs action now" },
  { id:"today",   label:"Due today" },
  { id:"waiting", label:"Waiting on" },
  { id:"all",     label:"All 12" },
];

/* ==== PHASES ==== */
const PHASES = [
  {
    narration: `Your Monday morning — twelve items land on you before your coffee cools.`,
    enter: enterP1,
  },
  {
    narration: `Look closer. Each has <em>hidden structure</em> — type, status, due date — sitting in your head, never written down.`,
    enter: enterP2,
  },
  {
    narration: `AI doesn't invent the structure. It <em>surfaces what was already there</em>.`,
    enter: enterP3,
  },
  {
    narration: `Same question. Different cost. The schema does the scanning.`,
    enter: enterP4,
  },
];

/* ==== DOM BUILD ==== */
const itemsEl = document.getElementById("items");
function buildItems() {
  itemsEl.innerHTML = "";
  ITEMS.forEach(it => {
    const el = document.createElement("div");
    el.className = "item";
    el.dataset.id = String(it.id);
    el.dataset.status = it.status;
    const m = MEDIA[it.medium];
    el.innerHTML = `
      <div class="item-row">
        <span class="glyph">${m.glyph}</span>
        <div class="medium-col">
          <span class="medium">${m.label}</span>
          <span class="detail">${it.detail}</span>
        </div>
        <div class="raw-text">${it.raw}</div>
      </div>
      <div class="annot">
        <span class="annot-chip" data-f="type"><span class="lbl">type</span>${it.type}</span>
        <span class="annot-chip" data-f="status"><span class="lbl">status</span>${it.status}</span>
        <span class="annot-chip" data-f="due"><span class="lbl">due</span>${it.due}</span>
      </div>
      <div class="typed">
        <span class="type">${it.type}</span>
        <span class="status ${it.status}">${it.status}</span>
        <span class="due">${it.due}</span>
        <span class="what">${it.what}</span>
        <span class="next">${it.next}</span>
      </div>
    `;
    itemsEl.appendChild(el);
  });
}
buildItems();

const itemEls = () => Array.from(itemsEl.querySelectorAll(".item"));

/* ==== FILTER CHIPS ==== */
const filtersEl = document.getElementById("filters");
let activeFilter = "now";
function buildFilters() {
  filtersEl.innerHTML = "";
  FILTERS.forEach(f => {
    const b = document.createElement("button");
    b.className = "chip" + (f.id === activeFilter ? " on" : "");
    b.textContent = f.label;
    b.dataset.filter = f.id;
    b.onclick = () => {
      activeFilter = f.id;
      buildFilters();
      applyFilter();
    };
    filtersEl.appendChild(b);
  });
}
buildFilters();

function applyFilter() {
  itemEls().forEach(el => {
    const status = el.dataset.status;
    const show = activeFilter === "all" || status === activeFilter;
    el.classList.toggle("filtered-out", !show);
  });
}

/* ==== PHASE ENTER HANDLERS ==== */

let highlightTimer = null;
let demoTimers = [];
function clearDemoTimers() {
  demoTimers.forEach(t => clearTimeout(t));
  demoTimers = [];
}
function stopHighlightCycle() {
  if (highlightTimer) { clearInterval(highlightTimer); highlightTimer = null; }
  clearDemoTimers();
  itemEls().forEach(el => el.classList.remove(
    "highlight", "demo-focus",
    "focus-type", "focus-status", "focus-due",
    "show-type", "show-status", "show-due"
  ));
}

function enterP1() {
  clearBodyPhaseClass();
  document.body.classList.add("p1");
  stopHighlightCycle();
  // Reset everything
  const els = itemEls();
  els.forEach(el => {
    el.classList.remove("visible", "annotated", "typed-view", "highlight", "filtered-out");
  });
  // Stream items in one by one — irregular pacing so it feels like real
  // arrivals (a ping, a pause, a cluster), not a metronome. Total ~4s.
  const gaps = [0, 340, 280, 520, 260, 310, 420, 280, 360, 300, 470, 290];
  let t = 180;
  els.forEach((el, i) => {
    t += gaps[i];
    setTimeout(() => el.classList.add("visible"), t);
  });
}

const DEMO_IDS = [1, 2, 3]; // first three items, top-to-bottom — email, meeting notes, voice memo
function enterP2() {
  clearBodyPhaseClass();
  document.body.classList.add("p2");
  stopHighlightCycle();
  const els = itemEls();
  els.forEach(el => {
    el.classList.add("visible");
    el.classList.remove(
      "typed-view", "filtered-out", "annotated",
      "show-type", "show-status", "show-due",
      "focus-type", "focus-status", "focus-due", "demo-focus"
    );
  });
  runPhase2Demo();
}

function runPhase2Demo() {
  const els = itemEls();
  const byId = (id) => els.find(el => Number(el.dataset.id) === id);

  // Demo sequence: per item, ~2.8s — focus in, reveal type, status, due (each ~700ms apart), then release.
  // Chips persist after release; raw-text highlights fade.
  let t = 400;
  DEMO_IDS.forEach((id) => {
    const el = byId(id);
    if (!el) return;
    demoTimers.push(setTimeout(() => el.classList.add("demo-focus"), t));
    demoTimers.push(setTimeout(() => el.classList.add("focus-type",   "show-type"),   t + 400));
    demoTimers.push(setTimeout(() => el.classList.add("focus-status", "show-status"), t + 1100));
    demoTimers.push(setTimeout(() => el.classList.add("focus-due",    "show-due"),    t + 1800));
    demoTimers.push(setTimeout(() => {
      el.classList.remove("demo-focus", "focus-type", "focus-status", "focus-due");
    }, t + 2700));
    t += 2800;
  });

  // After all demos: fill the remaining 9 items. Chips reveal field-by-field
  // (type → status → due) within each item, and items stagger across — so the
  // fill-in feels like a wave of extraction rather than a popcorn burst.
  demoTimers.push(setTimeout(() => {
    const remaining = els.filter(el => !DEMO_IDS.includes(Number(el.dataset.id)));
    remaining.forEach((el, i) => {
      const base = i * 180;
      demoTimers.push(setTimeout(() => el.classList.add("show-type"),   base));
      demoTimers.push(setTimeout(() => el.classList.add("show-status"), base + 150));
      demoTimers.push(setTimeout(() => el.classList.add("show-due"),    base + 300));
    });
  }, t + 500));
}

let extracted = false;
function enterP3() {
  clearBodyPhaseClass();
  document.body.classList.add("p3");
  stopHighlightCycle();
  // Keep annotated state visually, then morph on extract
  const els = itemEls();
  els.forEach(el => {
    el.classList.add("visible");
    el.classList.remove("highlight", "filtered-out");
    // If coming back from phase 4, undo typed view
    el.classList.remove("typed-view");
    el.classList.add("annotated");
  });
  extracted = false;
  document.body.classList.add("pre-extract");
  const btn = document.getElementById("extractBtn");
  btn.disabled = false;
  btn.innerHTML = `<span class="spark">⚡</span>Extract structure with AI`;
}

const wait = (ms) => new Promise(r => setTimeout(r, ms));
function extractOne(el) {
  el.classList.add("extracting");
  // After the fade-out, swap to typed-view. Cells fade in via cellIn keyframe.
  return wait(280).then(() => {
    el.classList.remove("extracting", "annotated");
    el.classList.add("typed-view");
  });
}

function runExtract() {
  if (extracted) return;
  extracted = true;
  const btn = document.getElementById("extractBtn");
  btn.disabled = true;
  btn.innerHTML = `Extracted.`;
  const els = itemEls();

  // Uniform fast wave — every row converts on the same rhythm, top-to-bottom.
  const stagger = 90;
  els.forEach((el, i) => {
    setTimeout(() => extractOne(el), i * stagger);
  });

  setTimeout(() => {
    document.body.classList.remove("pre-extract");
  }, els.length * stagger + 400);
}

function enterP4() {
  clearBodyPhaseClass();
  document.body.classList.add("p4");
  stopHighlightCycle();
  const els = itemEls();
  els.forEach(el => {
    el.classList.add("visible", "typed-view");
    el.classList.remove("annotated", "highlight");
  });
  activeFilter = "now";
  buildFilters();
  applyFilter();
}

function clearBodyPhaseClass() {
  document.body.classList.remove("p1", "p2", "p3", "p4", "pre-extract");
}

/* ==== PHASE MACHINERY ==== */
const narrationEl = document.getElementById("narration");
const counterEl = document.getElementById("counter");
const progressEl = document.getElementById("progress");
const nextBtn = document.getElementById("nextBtn");
const backBtn = document.getElementById("backBtn");

let phase = 0;

function renderProgress() {
  progressEl.innerHTML = "";
  PHASES.forEach((_, i) => {
    const d = document.createElement("div");
    d.className = "phase-dot" + (i < phase ? " done" : i === phase ? " active" : "");
    progressEl.appendChild(d);
  });
}

function goToPhase(i) {
  phase = Math.max(0, Math.min(PHASES.length - 1, i));
  const p = PHASES[phase];
  narrationEl.innerHTML = p.narration;
  narrationEl.classList.remove("fade-in");
  void narrationEl.offsetWidth;
  narrationEl.classList.add("fade-in");
  p.enter();
  counterEl.textContent = `${phase + 1} / ${PHASES.length}`;
  renderProgress();

  backBtn.disabled = phase === 0;
  if (phase === PHASES.length - 1) {
    nextBtn.textContent = "Reset ↺";
    nextBtn.onclick = () => goToPhase(0);
  } else {
    nextBtn.textContent = "Next →";
    nextBtn.onclick = () => goToPhase(phase + 1);
  }

  // Tell the parent page a phase change happened so it can scroll the iframe
  // top into view — critical on mobile where the reader is typically at the
  // bottom of the artefact when they click Next.
  if (window.parent && window.parent !== window) {
    window.parent.postMessage({ type: "artefact:phase-change", phase }, "*");
  }
}

backBtn.onclick = () => goToPhase(phase - 1);
document.getElementById("extractBtn").onclick = runExtract;

/* ==== CAPTURE CONTRACT ====
 * window.__artefact is the deterministic interface used by scripts/capture.mjs.
 * Every artefact that wants to be captured should expose the same shape.
 * ========================= */
function phaseReadyMs(i) {
  // conservative "animations complete" durations for each phase
  switch (i) {
    case 0: return 180 + 340+280+520+260+310+420+280+360+300+470+290 + 300; // stream-in wave (~4s)
    case 1: return 400 + 3 * 2800 + 500 + 9 * 180 + 300 + 400; // demo + wave fill (~11s)
    case 2: return 300;                             // pre-extract still
    case 3: return 400;                             // filter applied
    default: return 400;
  }
}
window.__artefact = {
  slug: "friction-tax",
  phaseCount: PHASES.length,
  currentPhase: () => phase,
  goToPhase: (i) => { goToPhase(i); return window.__artefact.phaseReady(); },
  runExtract: () => {
    runExtract();
    // 12 rows × 90ms stagger + 280ms swap + 400ms buffer ≈ 1760ms
    return new Promise(r => setTimeout(r, 1800));
  },
  phaseReady: () => new Promise(r => setTimeout(r, phaseReadyMs(phase))),
};

goToPhase(0);

/* ==== IFRAME SELF-SIZING ====
 * Posts content height to the parent so the iframe renders at 100%
 * of the artefact's natural height — no scrollbars, no wasted space.
 * Re-fires on load, resize, and any DOM size change (phase transitions).
 * =========================== */
function postHeight() {
  const h = Math.ceil(document.documentElement.getBoundingClientRect().height);
  if (window.parent && window.parent !== window) {
    window.parent.postMessage({ type: "artefact:height", height: h }, "*");
  }
}
window.addEventListener("load", postHeight);
window.addEventListener("resize", postHeight);
new ResizeObserver(postHeight).observe(document.body);
</script>
</body>
</html>

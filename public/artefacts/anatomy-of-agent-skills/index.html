<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Anatomy of Agent Skills · artefact</title>
<link rel="preconnect" href="https://rsms.me/" />
<link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
<link rel="stylesheet" href="/styles/artefact.css" />
<style>
/* ==== ANATOMY LAYOUT ==== */
.anatomy {
  position: relative;
  display: grid;
  grid-template-columns: 140px 1fr 140px;
  gap: 0;
  max-width: 820px;
  margin: 0 auto;
}
.anatomy.hidden { display: none; }

/* Label columns */
.labels { position: relative; }

.label {
  position: absolute;
  font-family: "Inter", sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.3px;
  color: var(--ink-soft);
  cursor: pointer;
  padding: 4px 0;
  transition: color 0.25s;
}
.labels-left .label { right: 20px; text-align: right; }
.labels-right .label { left: 20px; text-align: left; }
.label.highlight { color: var(--accent); }
.label .sub {
  display: block;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.2px;
  color: var(--muted);
  opacity: 0.85;
  margin-top: 3px;
  transition: color 0.25s, opacity 0.25s;
}
.label.highlight .sub { color: var(--accent); opacity: 0.8; }

/* ==== SPECIMEN ==== */
.specimen {
  border: 1px solid var(--line);
  border-radius: 8px;
  overflow: hidden;
  position: relative;
  z-index: 2;
  min-width: 0;
}
.specimen-tab {
  font-family: "Inter", sans-serif;
  font-size: 10px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  color: var(--muted);
  padding: 7px 18px;
  border-bottom: 1px solid var(--line);
  background: #f5f2ea;
}

.section {
  padding: 12px 18px;
  font-family: "SF Mono", "Menlo", ui-monospace, monospace;
  font-size: 12px;
  line-height: 1.65;
  color: var(--ink-soft);
  cursor: pointer;
  transition: background 0.2s;
  border-bottom: 1px solid var(--line);
  position: relative;
  white-space: pre-wrap;
  word-break: break-word;
}
.section:last-child { border-bottom: none; }

/* Accent left bar on hover */
.section::after {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: transparent;
  transition: background 0.2s;
}
.section.highlight {
  background: rgba(217, 75, 47, 0.035);
}
.section.highlight::after {
  background: var(--accent);
}

/* Mobile section header — hidden on desktop */
.section .mobile-lbl {
  display: none;
  font-family: "Inter", sans-serif;
  font-size: 10px; font-weight: 800;
  letter-spacing: 0.8px; text-transform: uppercase;
  color: var(--accent);
  background: #f5f2ea;
  border-bottom: 1px solid var(--line);
  padding: 8px 14px;
  margin: -12px -14px 10px;
}
.section .mobile-lbl .mobile-sub {
  font-weight: 500;
  letter-spacing: 0.2px;
  text-transform: none;
  color: var(--muted);
  margin-left: 8px;
  font-size: 10px;
}

/* ==== SYNTAX HIGHLIGHTING ==== */
.ym-delim { color: var(--muted); }
.ym-key { color: var(--ink); font-weight: 600; }
.ym-val { color: var(--ink-soft); }
.md-h { color: var(--ink); font-weight: 700; }
.md-h .hash { color: var(--muted); font-weight: 400; }
.md-code {
  background: rgba(0,0,0,0.045); padding: 1px 4px; border-radius: 3px;
  font-size: 10.5px;
}
.md-link { color: var(--accent); }
.md-bold { font-weight: 700; color: var(--ink); }
.md-num { color: var(--accent); font-weight: 600; }
.md-constraint { color: var(--accent); font-weight: 600; }
.md-kw { color: #6b5ce7; }
.md-str { color: #2a7e4f; }
.md-fn { color: #b07a1b; }

/* ==== SVG CONNECTOR LINES ==== */
.lines-svg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 3;
}
.connector-line {
  stroke: var(--line);
  stroke-width: 1;
  fill: none;
  transition: stroke 0.25s, stroke-width 0.25s;
}
.connector-line.highlight {
  stroke: var(--accent);
  stroke-width: 1.5;
}
.connector-dot {
  fill: var(--line);
  transition: fill 0.25s;
}
.connector-dot.highlight {
  fill: var(--accent);
}

/* ==== MODAL OVERLAY ==== */
.modal-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(26, 26, 29, 0.35);
  z-index: 100;
  justify-content: center;
  align-items: center;
  padding: 24px;
}
.modal-backdrop.active {
  display: flex;
  animation: backdropIn 0.25s ease;
}
@keyframes backdropIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.modal {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 14px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
  max-width: 720px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  padding: 28px;
  animation: modalIn 0.3s ease;
}
@keyframes modalIn {
  from { opacity: 0; transform: translateY(12px) scale(0.97); }
  to { opacity: 1; transform: none; }
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 22px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--line);
}
.modal-title {
  font-family: "Inter", sans-serif;
  font-size: 14px; font-weight: 800;
  letter-spacing: 1px; text-transform: uppercase;
  color: var(--accent);
}
.modal-close {
  font-family: "Inter", sans-serif;
  font-size: 12px; font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  border: 1px solid var(--line); background: var(--paper);
  border-radius: 6px;
  padding: 6px 12px;
  transition: color 0.2s, border-color 0.2s;
}
.modal-close:hover { color: var(--ink); border-color: var(--ink); }

.modal-body {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  align-items: start;
}

.modal-code {
  background: #f8f5ed;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 18px;
  font-family: "SF Mono", "Menlo", ui-monospace, monospace;
  font-size: 12px;
  line-height: 1.7;
  color: var(--ink-soft);
  box-shadow: inset 3px 0 0 var(--accent);
  white-space: pre-wrap;
  word-break: break-word;
}

.modal-annotation {
  font-size: 15px;
  line-height: 1.7;
  color: var(--ink-soft);
}
.modal-annotation p { margin: 0 0 14px; }
.modal-annotation p:last-child { margin-bottom: 0; }
.modal-annotation strong { color: var(--ink); font-weight: 700; }
.modal-annotation em { color: var(--accent); font-style: italic; }

/* Dim anatomy when modal is open */
.anatomy.dimmed { opacity: 0.3; pointer-events: none; transition: opacity 0.25s; }

/* ==== MOBILE (≤768px) ==== */
@media (max-width: 768px) {
  .anatomy { grid-template-columns: 1fr; }
  .labels { display: none; }
  .lines-svg { display: none; }

  .section .mobile-lbl { display: block; }
  .section { padding: 12px 14px; font-size: 11px; }
  .specimen-tab { padding: 6px 14px; }

  .modal-backdrop { padding: 12px; }
  .modal { padding: 20px; max-height: 90vh; }
  .modal-body { grid-template-columns: 1fr; }
  .modal-code { font-size: 11px; padding: 14px; }
  .modal-annotation { font-size: 14px; }
  .modal-close { min-height: 36px; padding: 8px 14px; }
}
</style>
</head>
<body>
<div class="wrap">
<div class="stage">

  <div class="anatomy" id="anatomy">
    <div class="labels labels-left" id="labelsLeft"></div>
    <div class="specimen" id="specimen">
      <div class="specimen-tab">SKILL.md</div>
    </div>
    <div class="labels labels-right" id="labelsRight"></div>
    <svg class="lines-svg" id="linesSvg"></svg>
  </div>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" id="modal">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle"></div>
        <button class="modal-close" id="modalClose">Close</button>
      </div>
      <div class="modal-body">
        <div class="modal-code" id="modalCode"></div>
        <div class="modal-annotation" id="modalAnnotation"></div>
      </div>
    </div>
  </div>

  <div class="prompt" id="prompt">Hover to explore. Click any section to see why it's load-bearing.</div>


</div>
</div>

<script>
/* ==== SECTION DATA ==== */
const SECTIONS = [
  {
    id: 'frontmatter',
    title: 'Discovery',
    sub: 'name + description',
    side: 'left',
    code: [
      '<span class="ym-delim">---</span>',
      '<span class="ym-key">name:</span> <span class="ym-val">processing-pdfs</span>',
      '<span class="ym-key">description:</span> <span class="ym-val">Extract text and tables from PDF files, fill forms, merge documents. Use when working with PDFs, forms, or extraction.</span>',
      '<span class="ym-delim">---</span>',
    ].join('\n'),
    annotation: [
      '<p><strong>An agent might have access to hundreds of skills.</strong> When a task comes in, it scans every skill\u2019s name and description to decide which one to load. This block is what it scans.</p>',
      '<p>If the description doesn\u2019t match the task, nothing below this line ever gets read. The skill stays on the shelf. So the description isn\u2019t documentation \u2014 it\u2019s more like a search query, written in advance, that determines when this skill wakes up.</p>',
      '<p><em>Be specific. Include the words someone would use to describe the task.</em> A vague description means the skill activates when it shouldn\u2019t, or doesn\u2019t when it should.</p>',
    ].join(''),
  },
  {
    id: 'knowledge',
    title: 'Domain Knowledge',
    sub: 'what the agent doesn\u2019t already know',
    side: 'right',
    code: [
      '<span class="md-h"><span class="hash">#</span> PDF Processing</span>',
      '',
      '<span class="md-h"><span class="hash">##</span> Quick start</span>',
      '',
      'Extract text with pdfplumber:',
      '',
      '  <span class="md-kw">import</span> pdfplumber',
      '  <span class="md-kw">with</span> pdfplumber.<span class="md-fn">open</span>(<span class="md-str">"f.pdf"</span>) <span class="md-kw">as</span> pdf:',
      '    text = pdf.pages[0].<span class="md-fn">extract_text</span>()',
      '',
      'For scanned PDFs, use pdf2image',
      'with pytesseract instead.',
    ].join('\n'),
    annotation: [
      '<p><strong>The model already knows what PDFs are.</strong> It knows how libraries work in general. What it doesn\u2019t know is which library to use for <em>this</em> job, which method to call first, and what to do when the PDF is scanned instead of digital.</p>',
      '<p>That\u2019s what this section provides: the specific, non-obvious knowledge that separates someone who\u2019s done this before from someone figuring it out for the first time. Not general intelligence \u2014 <strong>earned expertise.</strong></p>',
      '<p>Keep it lean. Every line here takes up space in the agent\u2019s working memory. If you can remove a sentence and the agent still gets it right, remove it.</p>',
    ].join(''),
  },
  {
    id: 'workflow',
    title: 'Workflow',
    sub: 'encoded sequence + feedback loops',
    side: 'left',
    code: [
      '<span class="md-h"><span class="hash">##</span> Form filling workflow</span>',
      '',
      '<span class="md-num">1.</span> Analyze: <span class="md-code">analyze_form.py input.pdf</span>',
      '<span class="md-num">2.</span> Map fields: edit <span class="md-code">fields.json</span>',
      '<span class="md-num">3.</span> Validate: <span class="md-code">validate_fields.py fields.json</span>',
      '<span class="md-num">4.</span> Fill: <span class="md-code">fill_form.py input.pdf out.pdf</span>',
      '<span class="md-num">5.</span> Verify \u2014 <span class="md-constraint">if fails, return to step 2</span>',
    ].join('\n'),
    annotation: [
      '<p><strong>Some operations break if you do them out of order.</strong> Fill a form before validating the field map, and the output is silently wrong. The person who wrote this workflow learned that \u2014 probably the hard way \u2014 and encoded the lesson as a fixed sequence.</p>',
      '<p>Notice step 5: <em>if validation fails, go back to step 2.</em> That loop isn\u2019t an edge case. It\u2019s there because this fails often enough that the retry is part of the design.</p>',
      '<p>Without a workflow section, the agent improvises its own order. For simple tasks, that\u2019s fine. For fragile ones, the sequence <strong>is</strong> the skill.</p>',
    ].join(''),
  },
  {
    id: 'guardrails',
    title: 'Guardrails',
    sub: 'what the agent must not do',
    side: 'right',
    code: [
      '<span class="md-constraint">Do not modify the command or add flags.</span>',
      '<span class="md-constraint">Only proceed when validation passes.</span>',
    ].join('\n'),
    annotation: [
      '<p><strong>Two lines. Easy to overlook. But remove them and watch what happens.</strong></p>',
      '<p>Without the first line, the agent will helpfully add flags like <em>--verbose</em> or <em>--force</em> to commands, because it\u2019s trying to be thorough. Without the second, it will press on after a validation error, because it\u2019s trying to be efficient. Both instincts are reasonable. Both break things here.</p>',
      '<p>Guardrails are where past failures get encoded. Someone already learned that adding flags to this command corrupts the output. These two lines mean <strong>no one learns that lesson again.</strong></p>',
    ].join(''),
  },
  {
    id: 'disclosure',
    title: 'Progressive Disclosure',
    sub: 'knowledge loaded on demand',
    side: 'left',
    code: [
      '<span class="md-h"><span class="hash">##</span> Advanced features</span>',
      '',
      '<span class="md-bold">Form filling</span>: See <span class="md-link">FORMS.md</span>',
      '<span class="md-bold">API reference</span>: See <span class="md-link">REFERENCE.md</span>',
      '<span class="md-bold">Examples</span>: See <span class="md-link">EXAMPLES.md</span>',
    ].join('\n'),
    annotation: [
      '<p><strong>These links point to other files in the same directory.</strong> FORMS.md, REFERENCE.md, EXAMPLES.md \u2014 each is a full document the agent <em>can</em> read, but won\u2019t until the task requires it. They sit on the filesystem, using zero memory until opened.</p>',
      '<p>Think of it like a desk and a filing cabinet. The main skill file is the desk \u2014 just enough to work with right now. The referenced files are drawers you pull open only when the task gets specific.</p>',
      '<p>This is something a regular prompt can\u2019t do. A prompt is all-or-nothing: every word sits in the agent\u2019s working memory whether the task needs it or not. A skill file lets the agent <em>decide what to load and when.</em></p>',
    ].join(''),
  },
];

/* ==== BUILD DOM ==== */
const specimenEl = document.getElementById('specimen');
const labelsLeftEl = document.getElementById('labelsLeft');
const labelsRightEl = document.getElementById('labelsRight');

SECTIONS.forEach(s => {
  const sec = document.createElement('div');
  sec.className = 'section';
  sec.dataset.section = s.id;
  sec.innerHTML = `<div class="mobile-lbl">${s.title} <span class="mobile-sub">${s.sub}</span></div>${s.code}`;
  specimenEl.appendChild(sec);

  const lbl = document.createElement('div');
  lbl.className = 'label';
  lbl.dataset.section = s.id;
  lbl.innerHTML = `${s.title}<span class="sub">${s.sub}</span>`;
  (s.side === 'left' ? labelsLeftEl : labelsRightEl).appendChild(lbl);
});

/* ==== POSITION LABELS ==== */
function positionLabels() {
  const anatomy = document.getElementById('anatomy');
  const aRect = anatomy.getBoundingClientRect();

  SECTIONS.forEach(s => {
    const sec = specimenEl.querySelector(`[data-section="${s.id}"]`);
    const lbl = document.querySelector(`.labels .label[data-section="${s.id}"]`);
    if (!sec || !lbl) return;
    const sRect = sec.getBoundingClientRect();
    const centerY = sRect.top + sRect.height / 2 - aRect.top;
    lbl.style.top = (centerY - lbl.offsetHeight / 2) + 'px';
  });
}

/* ==== DRAW CONNECTOR LINES ==== */
function drawLines() {
  const svg = document.getElementById('linesSvg');
  const anatomy = document.getElementById('anatomy');
  const aRect = anatomy.getBoundingClientRect();

  svg.innerHTML = '';
  svg.setAttribute('width', aRect.width);
  svg.setAttribute('height', aRect.height);

  SECTIONS.forEach(s => {
    const sec = specimenEl.querySelector(`[data-section="${s.id}"]`);
    const lbl = document.querySelector(`.labels .label[data-section="${s.id}"]`);
    if (!sec || !lbl) return;

    const sRect = sec.getBoundingClientRect();
    const lRect = lbl.getBoundingClientRect();

    const sy = sRect.top + sRect.height / 2 - aRect.top;
    const ly = lRect.top + lRect.height / 2 - aRect.top;

    let sx, lx;
    if (s.side === 'left') {
      sx = sRect.left - aRect.left;
      lx = lRect.right - aRect.left;
    } else {
      sx = sRect.right - aRect.left;
      lx = lRect.left - aRect.left;
    }

    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', lx);
    line.setAttribute('y1', ly);
    line.setAttribute('x2', sx);
    line.setAttribute('y2', sy);
    line.setAttribute('class', 'connector-line');
    line.dataset.section = s.id;
    svg.appendChild(line);

    const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    dot.setAttribute('cx', sx);
    dot.setAttribute('cy', sy);
    dot.setAttribute('r', 3);
    dot.setAttribute('class', 'connector-dot');
    dot.dataset.section = s.id;
    svg.appendChild(dot);
  });
}

/* ==== HOVER HIGHLIGHTING ==== */
function highlightSection(id) {
  document.querySelectorAll('.section.highlight').forEach(el => el.classList.remove('highlight'));
  document.querySelectorAll('.label.highlight').forEach(el => el.classList.remove('highlight'));
  document.querySelectorAll('.connector-line.highlight').forEach(el => el.classList.remove('highlight'));
  document.querySelectorAll('.connector-dot.highlight').forEach(el => el.classList.remove('highlight'));

  if (!id) return;

  const sec = specimenEl.querySelector(`[data-section="${id}"]`);
  const lbl = document.querySelector(`.labels .label[data-section="${id}"]`);
  const line = document.querySelector(`.connector-line[data-section="${id}"]`);
  const dot = document.querySelector(`.connector-dot[data-section="${id}"]`);

  if (sec) sec.classList.add('highlight');
  if (lbl) lbl.classList.add('highlight');
  if (line) line.classList.add('highlight');
  if (dot) dot.classList.add('highlight');
}

/* Hover on sections */
document.querySelectorAll('.section').forEach(sec => {
  sec.addEventListener('mouseenter', () => highlightSection(sec.dataset.section));
  sec.addEventListener('mouseleave', () => highlightSection(null));
});
specimenEl.addEventListener('mouseleave', () => highlightSection(null));

/* Hover on labels */
document.querySelectorAll('.label').forEach(lbl => {
  lbl.addEventListener('mouseenter', () => highlightSection(lbl.dataset.section));
  lbl.addEventListener('mouseleave', () => highlightSection(null));
});

/* ==== MODAL ==== */
let activeSection = null;
const backdrop = document.getElementById('modalBackdrop');
const anatomyEl = document.getElementById('anatomy');

function openModal(id) {
  const s = SECTIONS.find(x => x.id === id);
  if (!s) return;
  activeSection = id;

  highlightSection(id);
  anatomyEl.classList.add('dimmed');
  backdrop.classList.add('active');

  document.getElementById('modalTitle').textContent = s.title;

  const body = document.querySelector('.modal-body');
  body.innerHTML = `
    <div class="modal-code" id="modalCode"></div>
    <div class="modal-annotation" id="modalAnnotation"></div>`;
  document.getElementById('modalCode').innerHTML = s.code;
  document.getElementById('modalAnnotation').innerHTML = s.annotation;

  document.getElementById('prompt').textContent =
    `${s.title} \u2014 one of five layers in a skill file.`;

  postHeight();
}

function closeModal() {
  activeSection = null;
  backdrop.classList.remove('active');
  anatomyEl.classList.remove('dimmed');
  highlightSection(null);
  document.getElementById('prompt').textContent =
    'Hover to explore. Click any section to see why it\u2019s load-bearing.';
}

/* Click handlers */
document.querySelectorAll('.section').forEach(sec => {
  sec.addEventListener('click', () => openModal(sec.dataset.section));
});
document.querySelectorAll('.label').forEach(lbl => {
  lbl.addEventListener('click', () => openModal(lbl.dataset.section));
});
document.getElementById('modalClose').addEventListener('click', closeModal);
backdrop.addEventListener('click', e => {
  if (e.target === backdrop) closeModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && activeSection) closeModal();
});

/* ==== INIT ==== */
function layout() {
  positionLabels();
  drawLines();
}

window.addEventListener('load', () => { layout(); postHeight(); });
window.addEventListener('resize', () => {
  if (!activeSection) layout();
  postHeight();
});

/* ==== CAPTURE CONTRACT ==== */
window.__artefact = {
  slug: 'anatomy-of-agent-skills',
  phaseCount: 1,
  currentPhase: () => 0,
  goToPhase: () => { hideDetail(); return Promise.resolve(); },
  phaseReady: () => new Promise(r => setTimeout(r, 400)),
};

/* ==== IFRAME SELF-SIZING ==== */
function postHeight() {
  const h = Math.ceil(document.documentElement.getBoundingClientRect().height);
  if (window.parent && window.parent !== window) {
    window.parent.postMessage({ type: 'artefact:height', height: h }, '*');
  }
}
new ResizeObserver(postHeight).observe(document.body);
</script>
</body>
</html>

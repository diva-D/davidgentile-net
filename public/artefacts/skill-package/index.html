<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>From File to Package · artefact</title>
<link rel="preconnect" href="https://rsms.me/" />
<link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
<style>
:root {
  --bg: #faf7f0;
  --ink: #1a1a1d;
  --ink-soft: #4a4a52;
  --muted: #8c8c93;
  --line: #e4dfd2;
  --accent: #d94b2f;
  --gold: #e0a526;
  --green: #3a9f5e;
  --paper: #fff;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; background: var(--bg); color: var(--ink);
  font-family: "Iowan Old Style", "Palatino", ui-serif, Georgia, serif;
  -webkit-font-smoothing: antialiased;
}

.wrap { max-width: 1040px; margin: 0 auto; padding: 24px 24px 28px; }
.stage {
  background: var(--paper); border: 1px solid var(--line); border-radius: 14px;
  padding: 28px 32px 24px; box-shadow: 0 2px 0 rgba(0,0,0,0.03);
}

/* ==== LAYOUT ==== */
.build {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 28px;
  align-items: start;
}

/* Folder stack */
.folder {
  background: #f8f5ed;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 14px 16px;
  font-family: "SF Mono", "Menlo", ui-monospace, monospace;
  font-size: 12px;
  line-height: 1.9;
  color: var(--ink-soft);
}
.folder .dir-name {
  color: var(--muted);
  font-weight: 600;
  margin-bottom: 2px;
}
.file-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 3px 6px;
  margin: 0 -6px;
  border-radius: 4px;
}
.file-row.new {
  animation: fileIn 0.4s ease both;
}
@keyframes fileIn {
  from { opacity: 0; transform: translateY(-4px); }
  to { opacity: 1; transform: none; }
}
.file-row .pre { color: var(--line); user-select: none; }
.file-row .name { flex: 1; }
.file-row .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.file-row .dot.loaded { background: var(--accent); }
.file-row .dot.on-demand { background: var(--line); }
.file-row .dot.executed { background: var(--green); }

/* Token bar */
.token-bar {
  margin-top: 18px;
  padding-top: 14px;
  border-top: 1px solid var(--line);
}
.token-label {
  font-family: "Inter", sans-serif;
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.8px; text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}
.token-track {
  height: 6px;
  background: var(--line);
  border-radius: 3px;
  overflow: hidden;
}
.token-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
  transition: width 0.5s ease;
}
.token-val {
  font-family: "Inter", sans-serif;
  font-size: 10px;
  color: var(--muted);
  margin-top: 4px;
}

/* Narration */
.narration {
  font-size: 15px;
  line-height: 1.7;
  color: var(--ink-soft);
}
.narration p { margin: 0 0 14px; }
.narration p:last-child { margin-bottom: 0; }
.narration strong { color: var(--ink); font-weight: 700; }
.narration em { color: var(--accent); font-style: italic; }
.narration code {
  font-family: "SF Mono", "Menlo", ui-monospace, monospace;
  font-size: 13px;
  background: rgba(0,0,0,0.045);
  padding: 1px 5px;
  border-radius: 3px;
}

/* File preview */
.preview {
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid var(--line);
  animation: fileIn 0.3s ease both;
}
.preview-header {
  font-family: "Inter", sans-serif;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.5px;
  color: var(--muted);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.preview-header .badge {
  font-size: 9px; font-weight: 800;
  letter-spacing: 0.8px; text-transform: uppercase;
  padding: 2px 7px; border-radius: 3px;
}
.badge.on-demand {
  background: rgba(0,0,0,0.04); color: var(--muted);
  border: 1px solid var(--line);
}
.badge.executed {
  background: rgba(58,159,94,0.1); color: var(--green);
  border: 1px solid rgba(58,159,94,0.3);
}
.preview-code {
  background: #f8f5ed;
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 12px 14px;
  font-family: "SF Mono", "Menlo", ui-monospace, monospace;
  font-size: 11px;
  line-height: 1.6;
  color: var(--ink-soft);
  white-space: pre-wrap;
  box-shadow: inset 3px 0 0 var(--accent);
}
.preview-code.exec { box-shadow: inset 3px 0 0 var(--green); }

.previews-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid var(--line);
  animation: fileIn 0.3s ease both;
}

/* Phase nav */
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 22px;
  padding-top: 14px;
  border-top: 1px solid var(--line);
}
.step {
  font-family: "Inter", sans-serif;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.3px;
}
.btn {
  font-family: "Inter", sans-serif;
  font-size: 12px; font-weight: 600;
  color: var(--paper);
  background: var(--accent);
  border: none; border-radius: 6px;
  padding: 7px 16px;
  cursor: pointer;
  transition: opacity 0.2s;
}
.btn:hover { opacity: 0.85; }
.btn.back {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--line);
}
.btn.back:hover { color: var(--ink); border-color: var(--ink); }
.btn-group { display: flex; gap: 8px; }

/* ==== MOBILE ==== */
@media (max-width: 768px) {
  .wrap { padding: 12px 12px 18px; }
  .stage { padding: 20px 16px 18px; border-radius: 10px; }
  .build { grid-template-columns: 1fr; }
  .folder { font-size: 11px; }
  .narration { font-size: 14px; }
  .btn { min-height: 36px; }
  .previews-row { grid-template-columns: 1fr; }
}
@media (max-width: 640px) {
  .narration code { font-size: 12px; }
}
</style>
</head>
<body>
<div class="wrap">
<div class="stage" id="stage"></div>
</div>

<script>
const PHASES = [
  {
    files: [
      { name: 'SKILL.md', pre: '\u2514\u2500 ', dot: 'loaded' },
    ],
    tokens: 1200, tokenPct: 10,
    tokenLabel: '1,200 tokens \u00b7 the entire skill',
    narration: '<p><strong>For simple tasks, this is the entire skill.</strong> One file. Everything the agent needs \u2014 discovery, knowledge, workflow, guardrails \u2014 in under 2,000 tokens.</p><p>Most skills start here and many never need more. If the use case is straightforward, a single file is the whole package.</p>',
    previews: [],
  },
  {
    files: [
      { name: 'SKILL.md', pre: '\u251c\u2500 ', dot: 'loaded' },
      { name: 'FORMS.md', pre: '\u2514\u2500 ', dot: 'on-demand', isNew: true },
    ],
    tokens: 4600, tokenPct: 37,
    tokenLabel: '1,200 always loaded + 3,400 on demand',
    narration: '<p><strong>Now the task gets specific.</strong> A user asks the agent to fill a PDF form. The main file has the basics, but form-filling has dozens of edge cases \u2014 field types, date formats, signature fields.</p><p>You <em>could</em> cram all that into <code>SKILL.md</code>, but then every task pays the cost of loading it. Instead, <code>FORMS.md</code> sits alongside \u2014 3,400 tokens the agent only reads when the task actually involves forms.</p>',
    previews: ['FORMS.md'],
  },
  {
    files: [
      { name: 'SKILL.md', pre: '\u251c\u2500 ', dot: 'loaded' },
      { name: 'FORMS.md', pre: '\u251c\u2500 ', dot: 'on-demand' },
      { name: 'REFERENCE.md', pre: '\u251c\u2500 ', dot: 'on-demand', isNew: true },
      { name: 'EXAMPLES.md', pre: '\u2514\u2500 ', dot: 'on-demand', isNew: true },
    ],
    tokens: 12500, tokenPct: 100,
    tokenLabel: '1,200 always loaded + 11,300 available on demand',
    narration: '<p><strong>Same pattern for depth.</strong> <code>REFERENCE.md</code> holds the full API surface \u2014 every method, every parameter. <code>EXAMPLES.md</code> holds worked input/output pairs the agent can pattern-match against.</p><p>Each file exists because some tasks need it and most don\u2019t. The agent decides what to open based on what the task requires. <em>Depth without default cost.</em></p>',
    previews: ['REFERENCE.md', 'EXAMPLES.md'],
  },
  {
    files: [
      { name: 'SKILL.md', pre: '\u251c\u2500 ', dot: 'loaded' },
      { name: 'FORMS.md', pre: '\u251c\u2500 ', dot: 'on-demand' },
      { name: 'REFERENCE.md', pre: '\u251c\u2500 ', dot: 'on-demand' },
      { name: 'EXAMPLES.md', pre: '\u251c\u2500 ', dot: 'on-demand' },
      { name: 'scripts/', pre: '\u2514\u2500 ', isDir: true },
      { name: 'analyze_form.py', pre: '   \u2514\u2500 ', dot: 'executed', isNew: true },
    ],
    tokens: 12500, tokenPct: 100,
    tokenLabel: '1,200 always loaded + 11,300 on demand + scripts free',
    narration: '<p><strong>Now the skill needs to <em>do</em> something, not just <em>know</em> something.</strong> <code>analyze_form.py</code> isn\u2019t a document the agent reads into memory. It\u2019s a program it executes \u2014 calls the script, reads stdout, acts on the result.</p><p>Zero memory cost. Knowledge encoded as runnable code instead of prose.</p>',
    previews: ['analyze_form.py'],
  },
  {
    files: [
      { name: 'SKILL.md', pre: '\u251c\u2500 ', dot: 'loaded' },
      { name: 'FORMS.md', pre: '\u251c\u2500 ', dot: 'on-demand' },
      { name: 'REFERENCE.md', pre: '\u251c\u2500 ', dot: 'on-demand' },
      { name: 'EXAMPLES.md', pre: '\u251c\u2500 ', dot: 'on-demand' },
      { name: 'scripts/', pre: '\u2514\u2500 ', isDir: true },
      { name: 'analyze_form.py', pre: '   \u2514\u2500 ', dot: 'executed' },
    ],
    tokens: 12500, tokenPct: 100,
    tokenLabel: '1,200 base \u00b7 up to 12,500 total \u00b7 pays only for what it uses',
    narration: '<p><strong>What started as a single document is now a package.</strong> One main file, three reference files loaded on demand, one executable script. The agent always pays for 1,200 tokens. It <em>can</em> access 12,500 more \u2014 but only pays for what the task actually needs.</p><p>Not a prompt. Not a document. A program \u2014 with knowledge, branching, and tools, bundled into a single skill.</p>',
    previews: [],
  },
];

const FILE_PREVIEWS = {
  'FORMS.md': {
    badge: 'on-demand', badgeLabel: 'Loaded on demand',
    code: '# Form Filling Reference\n\n## Field types\n- text: standard input\n- checkbox: use /Yes, /Off\n- radio: group by field name\n- signature: skip (requires manual)\n\n## Date formats\nUS forms: MM/DD/YYYY\nISO:      YYYY-MM-DD',
  },
  'REFERENCE.md': {
    badge: 'on-demand', badgeLabel: 'Loaded on demand',
    code: '# pdfplumber API Reference\n\n## Page methods\n.extract_text()    \u2192 str\n.extract_tables()  \u2192 list[list]\n.crop(bbox)        \u2192 Page\n.within_bbox(bbox) \u2192 Page\n\n## Table settings\nsnap_tolerance:  3\njoin_tolerance:  3\nedge_min_length: 3',
  },
  'EXAMPLES.md': {
    badge: 'on-demand', badgeLabel: 'Loaded on demand',
    code: '# Worked Examples\n\n## Extract table from invoice\nInput:  invoice_q4.pdf (2 pages)\nOutput: CSV with columns:\n        date, item, qty, total\n\n## Merge two PDFs\nInput:  cover.pdf + report.pdf\nOutput: combined.pdf (concatenated)',
  },
  'analyze_form.py': {
    badge: 'executed', badgeLabel: 'Executed',
    code: '#!/usr/bin/env python3\n"""Analyze PDF form fields.\nOutputs JSON field map to stdout.\n"""\nimport pdfplumber, json, sys\n\ndef analyze(path):\n    with pdfplumber.open(path) as pdf:\n        fields = pdf.pages[0].annots\n    print(json.dumps(fields))',
  },
};

let phase = 0;

function render() {
  const p = PHASES[phase];
  const total = PHASES.length;
  const stage = document.getElementById('stage');

  // Folder
  let folder = '<div class="dir-name">processing-pdfs/</div>';
  p.files.forEach(f => {
    if (f.isDir) {
      folder += `<div class="file-row"><span class="pre">${f.pre}</span><span class="name" style="color:var(--muted);font-weight:600">${f.name}</span></div>`;
      return;
    }
    const cls = f.isNew ? ' new' : '';
    folder += `<div class="file-row${cls}"><span class="pre">${f.pre}</span><span class="name">${f.name}</span><span class="dot ${f.dot}"></span></div>`;
  });

  // Previews
  let previewHtml = '';
  if (p.previews.length === 1) {
    const fp = FILE_PREVIEWS[p.previews[0]];
    if (fp) {
      const ec = fp.badge === 'executed' ? ' exec' : '';
      previewHtml = `<div class="preview"><div class="preview-header"><span>${p.previews[0]}</span><span class="badge ${fp.badge}">${fp.badgeLabel}</span></div><div class="preview-code${ec}">${fp.code}</div></div>`;
    }
  } else if (p.previews.length === 2) {
    let cols = '';
    p.previews.forEach(name => {
      const fp = FILE_PREVIEWS[name];
      if (!fp) return;
      const ec = fp.badge === 'executed' ? ' exec' : '';
      cols += `<div><div class="preview-header"><span>${name}</span><span class="badge ${fp.badge}">${fp.badgeLabel}</span></div><div class="preview-code${ec}">${fp.code}</div></div>`;
    });
    previewHtml = `<div class="previews-row">${cols}</div>`;
  }

  // Nav
  let nav = `<div class="step">${phase + 1} / ${total}</div><div class="btn-group">`;
  if (phase > 0) nav += '<button class="btn back" id="btnBack">\u2190 Back</button>';
  if (phase < total - 1) nav += '<button class="btn" id="btnNext">Next \u2192</button>';
  else nav += '<button class="btn back" id="btnReset">Reset \u21ba</button>';
  nav += '</div>';

  stage.innerHTML = `
    <div class="build">
      <div>
        <div class="folder">${folder}</div>
        <div class="token-bar">
          <div class="token-label">Context cost</div>
          <div class="token-track"><div class="token-fill" style="width:${p.tokenPct}%"></div></div>
          <div class="token-val">${p.tokenLabel}</div>
        </div>
      </div>
      <div>
        <div class="narration">${p.narration}</div>
        ${previewHtml}
      </div>
    </div>
    <div class="nav">${nav}</div>`;

  const next = document.getElementById('btnNext');
  const back = document.getElementById('btnBack');
  const reset = document.getElementById('btnReset');
  if (next) next.addEventListener('click', () => { phase++; render(); });
  if (back) back.addEventListener('click', () => { phase--; render(); });
  if (reset) reset.addEventListener('click', () => { phase = 0; render(); });

  postHeight();
}

/* ==== IFRAME SELF-SIZING ==== */
function postHeight() {
  const h = Math.ceil(document.documentElement.getBoundingClientRect().height);
  if (window.parent && window.parent !== window) {
    window.parent.postMessage({ type: 'artefact:height', height: h }, '*');
  }
}
new ResizeObserver(postHeight).observe(document.body);

/* ==== CAPTURE CONTRACT ==== */
window.__artefact = {
  slug: 'skill-package',
  phaseCount: 5,
  currentPhase: () => phase,
  goToPhase: (n) => { phase = n; render(); return Promise.resolve(); },
  phaseReady: () => new Promise(r => setTimeout(r, 400)),
};

window.addEventListener('load', render);
</script>
</body>
</html>
